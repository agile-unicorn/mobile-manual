{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <style>
    /* Style for print icon next to language selector */
    .md-header__option {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .md-header__print {
      display: flex;
      align-items: center;
    }

    .md-header__print a {
      color: var(--md-primary-bg-color);
      text-decoration: none;
      font-size: 1.2rem;
      padding: 0.2rem 0.4rem;
      transition: opacity 0.2s;
    }

    .md-header__print a:hover {
      opacity: 0.7;
    }
  </style>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
    (function() {
        // Prüfe, ob der Benutzer bereits eine Sprache gewählt hat
        const languageSelected = sessionStorage.getItem('languageSelected');

        if (languageSelected) {
            return; // Keine automatische Weiterleitung, wenn Sprache bereits gewählt wurde
        }

        const hostname = window.location.hostname;
        const currentPath = window.location.pathname;

        // Wenn Subdomain "anleitung" ist und wir nicht auf /de/ sind
        if (hostname.startsWith('anleitung.') && !currentPath.startsWith('/de/')) {
            sessionStorage.setItem('languageSelected', 'true');
            const newPath = '/de' + currentPath;
            window.location.replace(newPath);
        }
        // Wenn Subdomain NICHT "anleitung" ist und wir auf /de/ sind
        else if (!hostname.startsWith('anleitung.') && currentPath.startsWith('/de/')) {
            sessionStorage.setItem('languageSelected', 'true');
            const newPath = currentPath.replace(/^\/de/, '');
            window.location.replace(newPath || '/');
        }
    })();

    // Markiere, dass der Benutzer eine Sprache gewählt hat, wenn er auf einen Sprach-Link klickt
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.md-select__link').forEach(function(link) {
            link.addEventListener('click', function() {
                sessionStorage.setItem('languageSelected', 'true');
            });
        });
    });
</script>
{% endblock %}
